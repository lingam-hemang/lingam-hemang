name: Rotate README Theme

on:
  schedule:
    - cron: "0 0,4,9,14,19 * * *"   # Runs at 00:00, 04:00, 09:00, 14:00, 19:00 UTC — 5 rotations/day
  workflow_dispatch:                # Also allows manual trigger from GitHub Actions tab

jobs:
  rotate:
    runs-on: ubuntu-latest

    permissions:
      contents: write               # Needed to commit and push README.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rotate README theme
        run: python rotate_readme.py

      - name: Commit and push updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .current_theme
          git diff --staged --quiet || git commit -m "chore: rotate README theme [skip ci]"
          git push
